<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0b" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ポータル" />
    <title>アプリポータル</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        --bg:      #0a0a0b;
        --surface: #141415;
        --border:  #2a2a2c;
        --text:    #f5f5f7;
        --muted:   #86868b;
        --accent:  #c0392b;

        --text-sm:   clamp(0.78rem,  0.74rem + 0.2vw,  0.85rem);
        --text-base: clamp(0.93rem,  0.88rem + 0.25vw, 1rem);
        --text-2xl:  clamp(1.6rem,   1.4rem  + 1vw,    2.1rem);
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
          "Hiragino Kaku Gothic ProN", "Yu Gothic UI", Meiryo, sans-serif;
        padding: 40px 20px;
        -webkit-font-smoothing: antialiased;
      }

      .wrap { width: 100%; max-width: 480px; }

      header { margin-bottom: 28px; }

      h1 {
        font-size: var(--text-2xl);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.1;
        margin-bottom: 6px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: opacity .15s;
      }
      h1:active { opacity: 0.5; }

      p.sub {
        font-size: var(--text-sm);
        color: var(--muted);
      }

      /* ---- Card list ---- */
      .card-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .card-item {
        animation: rise .4s cubic-bezier(.16,1,.3,1) both;
      }
      .card-item:nth-child(1) { animation-delay:  40ms; }
      .card-item:nth-child(2) { animation-delay:  90ms; }
      .card-item:nth-child(3) { animation-delay: 140ms; }
      .card-item:nth-child(4) { animation-delay: 190ms; }

      @keyframes rise {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .card-item { animation: none; }
        a.card:hover { transform: none; }
        #drag-clone { transform: none; }
      }

      a.card {
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 13px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        text-decoration: none;
        color: inherit;
        transition: border-color .18s, box-shadow .18s, transform .12s;
        -webkit-tap-highlight-color: transparent;
      }

      a.card:hover {
        border-color: var(--c, var(--accent));
        box-shadow:
          0 0 0 1px color-mix(in srgb, var(--c, var(--accent)) 40%, transparent),
          0 6px 28px color-mix(in srgb, var(--c, var(--accent)) 10%, transparent);
        transform: translateY(-1px);
      }
      a.card:active { transform: scale(0.985); box-shadow: none; }

      .card-bar {
        position: absolute;
        left: 0;
        top: 0;
        width: 2px;
        height: 100%;
        border-radius: 16px 0 0 16px;
        background: var(--c);
      }

      .card-icon {
        width: 46px;
        height: 46px;
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.45rem;
        flex-shrink: 0;
      }

      .card-body { flex: 1; min-width: 0; }

      .card-title {
        font-size: var(--text-base);
        font-weight: 600;
        letter-spacing: -0.015em;
      }
      .card-title.mono {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        letter-spacing: .04em;
      }

      .card-desc {
        font-size: var(--text-sm);
        color: var(--muted);
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-chevron {
        color: #3a3a3c;
        flex-shrink: 0;
        transition: color .18s;
      }
      a.card:hover .card-chevron { color: var(--muted); }

      footer {
        margin-top: 24px;
        text-align: center;
        font-size: 0.68rem;
        color: #333335;
        letter-spacing: 0.02em;
      }

      /* ---- Drag states ---- */
      .card-item.is-dragging > a.card {
        opacity: 0.2;
        border-style: dashed;
      }
      .card-item.drop-above { border-top: 2px solid var(--accent); border-radius: 2px; }
      .card-item.drop-below { border-bottom: 2px solid var(--accent); border-radius: 2px; }

      /* ---- EDGEカードの稼働モードバッジ(hlbot-dashboard /api/strategy から取得) ---- */
      .live-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-left: 8px;
        font-size: 0.6rem;
        letter-spacing: .08em;
        vertical-align: 1px;
        color: var(--muted);
      }
      .live-badge.live { color: #34c759; }
      .live-badge.halt { color: #ff453a; }
      .live-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
      .live-badge.live .live-dot { animation: pulse 2s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
      @media (prefers-reduced-motion: reduce) { .live-badge.live .live-dot { animation: none; } }

      #drag-clone {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        width: var(--w);
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 13px 14px;
        background: var(--surface);
        border: 1px solid var(--accent);
        border-radius: 16px;
        opacity: 0.96;
        transform: scale(1.04) rotate(0.8deg);
        box-shadow: 0 16px 48px rgba(0,0,0,0.7);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header>
        <h1 id="title" title="タップして更新">アプリポータル</h1>
        <p class="sub">利用するアプリを選んでください</p>
      </header>
      <ul class="card-list" id="cardList"></ul>
      <footer>個人利用・学習目的のツール群</footer>
    </main>

    <script>
      // 色は運用ルール: 表示中の全カード色をHSL hueで比較し、差20°未満のペアがあれば
      // 片方を30°以上ずらす(EDGE/PULSE/LOGが同系の暖色に密集していたため調整済み)
      const APPS = [
        { id: 'hyperliquid-bot', href: '/hyperliquid-bot/', emoji: '📈', color: '#f5a623', title: 'EDGE', desc: '自動売買botの成績・ポジション監視', mono: true },
        { id: 'hlbot-flow', href: '/hyperliquid-bot/architecture.html', emoji: '🧬', color: '#4a9eff', title: 'FLOW', desc: '自己進化オーケストレーションの仕組み(図解)', mono: true },
        { id: 'claude-usage', href: '/claude/', emoji: '🔥', color: '#06b6d4', title: 'BURN', desc: 'Claudeサブスク利用率とリセットまで', mono: true },
        { id: 'agents',   href: '/agents/',   emoji: '🤖', color: '#a855f7', title: 'BASE',  desc: 'エージェント管理', mono: true },
        { id: 'briefing', href: '/briefing',  emoji: '📰', color: '#f2542d', title: 'PULSE', desc: '毎朝の自動ニュースまとめ', mono: true },
        { id: 'diary',    href: '/diary/',    emoji: '📓', color: '#8a9a3a', title: 'LOG',   desc: 'Claude機能開発の記録', mono: true },
      ];

      const STORAGE_KEY = 'portal-order-v3';
      const ACCESS_KEY = 'portal-access-v1';

      // ── アクセス履歴（並び替えの「意図」とは別軸の「実績」表示用） ──
      function getAccessMap() {
        try { return JSON.parse(localStorage.getItem(ACCESS_KEY)) || {}; }
        catch { return {}; }
      }

      function recordAccess(id) {
        const map = getAccessMap();
        map[id] = Date.now();
        localStorage.setItem(ACCESS_KEY, JSON.stringify(map));
      }

      // 未使用時は1.0(死んだポータルに見せない)、当日アクセス1.0、週内0.6、それ以前・未記録0.35
      function computeOpacity(id, map) {
        if (!Object.keys(map).length) return 1;
        const ts = map[id];
        if (!ts) return 0.35;
        const ageMs = Date.now() - ts;
        if (ageMs < 24 * 3600_000) return 1;
        if (ageMs < 7 * 86_400_000) return 0.6;
        return 0.35;
      }

      function cardHTML(app, opacity) {
        const iconBg = `color-mix(in srgb,${app.color} 16%,#1c1c1e)`;
        const titleClass = app.mono ? 'card-title mono' : 'card-title';
        return `<a class="card" href="${app.href}" style="--c:${app.color}">
          <span class="card-bar" style="opacity:${opacity}"></span>
          <div class="card-icon" style="background:${iconBg}">${app.emoji}</div>
          <div class="card-body">
            <div class="${titleClass}">${app.title}</div>
            <div class="card-desc">${app.desc}</div>
          </div>
          <svg class="card-chevron" width="7" height="12" viewBox="0 0 7 12" fill="none">
            <path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>`;
      }

      function loadOrder() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (Array.isArray(saved)) {
            const ordered = saved.map(id => APPS.find(a => a.id === id)).filter(Boolean);
            const rest = APPS.filter(a => !saved.includes(a.id));
            return [...ordered, ...rest];
          }
        } catch {}
        return [...APPS];
      }

      // 並び替え(ドラッグ)は「意図」の表明であり、アクセス実績の記録対象ではない
      function saveOrder() {
        const ids = [...document.querySelectorAll('.card-item')].map(el => el.dataset.id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
      }

      function renderList(items) {
        const list = document.getElementById('cardList');
        const accessMap = getAccessMap();
        list.innerHTML = '';
        items.forEach(app => {
          const li = document.createElement('li');
          li.className = 'card-item';
          li.dataset.id = app.id;
          li.innerHTML = cardHTML(app, computeOpacity(app.id, accessMap));
          list.appendChild(li);
        });
        attachTouch();
        if (!isTouchDevice()) attachMouse();
      }

      // クリック(=実際に開いた)時のみ記録。再renderしても消えない委譲リスナーを1つだけ設置
      document.getElementById('cardList').addEventListener('click', e => {
        const card = e.target.closest('a.card');
        if (!card) return;
        const id = card.closest('.card-item')?.dataset.id;
        if (id) recordAccess(id);
      });

      // ---- タッチドラッグ（iPhone対応）----
      const LONG_PRESS = 400;
      let pressTimer = null, dragItem = null, clone = null, offX = 0, offY = 0;

      function getItemAt(x, y) {
        if (clone) clone.style.display = 'none';
        const el = document.elementFromPoint(x, y);
        if (clone) clone.style.display = '';
        return el && el.closest('.card-item');
      }

      function startDrag(item, touch) {
        dragItem = item;
        item.classList.add('is-dragging');
        const rect = item.getBoundingClientRect();
        offX = touch.clientX - rect.left;
        offY = touch.clientY - rect.top;

        const cardEl = item.querySelector('a.card');
        clone = document.createElement('div');
        clone.id = 'drag-clone';
        clone.style.setProperty('--w', rect.width + 'px');
        clone.innerHTML = cardEl.innerHTML;
        // つまんだカード自身の識別色を枠に反映（固定--accentへはフォールバックしない）
        const cardColor = cardEl.style.getPropertyValue('--c');
        if (cardColor) clone.style.borderColor = cardColor;
        clone.style.left = (touch.clientX - offX) + 'px';
        clone.style.top  = (touch.clientY - offY) + 'px';
        document.body.appendChild(clone);

        if (navigator.vibrate) navigator.vibrate(30);
      }

      function moveDrag(touch) {
        if (!clone) return;
        clone.style.left = (touch.clientX - offX) + 'px';
        clone.style.top  = (touch.clientY - offY) + 'px';
        document.querySelectorAll('.card-item').forEach(i => i.classList.remove('drop-above','drop-below'));
        const target = getItemAt(touch.clientX, touch.clientY);
        if (target && target !== dragItem) {
          const { top, height } = target.getBoundingClientRect();
          target.classList.add(touch.clientY < top + height / 2 ? 'drop-above' : 'drop-below');
        }
      }

      function endDrag(touch) {
        if (!dragItem) return;
        const target = getItemAt(touch.clientX, touch.clientY);
        if (target && target !== dragItem) {
          const { top, height } = target.getBoundingClientRect();
          const list = target.parentNode;
          list.insertBefore(dragItem, touch.clientY < top + height / 2 ? target : target.nextSibling);
          saveOrder();
        }
        dragItem.classList.remove('is-dragging');
        document.querySelectorAll('.card-item').forEach(i => i.classList.remove('drop-above','drop-below'));
        if (clone) { clone.remove(); clone = null; }
        dragItem = null;
      }

      function attachTouch() {
        document.querySelectorAll('.card-item').forEach(item => {
          item.addEventListener('touchstart', e => {
            const touch = e.touches[0];
            pressTimer = setTimeout(() => { pressTimer = null; startDrag(item, touch); }, LONG_PRESS);
          }, { passive: true });

          item.addEventListener('touchmove', e => {
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            if (!dragItem) return;
            e.preventDefault();
            moveDrag(e.touches[0]);
          }, { passive: false });

          item.addEventListener('touchend', e => {
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            if (!dragItem) return;
            e.preventDefault();
            endDrag(e.changedTouches[0]);
          }, { passive: false });

          item.addEventListener('touchcancel', () => {
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            if (dragItem) dragItem.classList.remove('is-dragging');
            document.querySelectorAll('.card-item').forEach(i => i.classList.remove('drop-above','drop-below'));
            if (clone) { clone.remove(); clone = null; }
            dragItem = null;
          });
        });
      }

      // ---- デスクトップ D&D ----
      function attachMouse() {
        let src = null;
        document.querySelectorAll('.card-item').forEach(item => {
          item.draggable = true;
          item.addEventListener('dragstart', () => { src = item; item.classList.add('is-dragging'); });
          item.addEventListener('dragend',   () => {
            item.classList.remove('is-dragging');
            document.querySelectorAll('.card-item').forEach(i => i.classList.remove('drop-above','drop-below'));
            saveOrder();
          });
          item.addEventListener('dragover', e => {
            e.preventDefault();
            if (!src || src === item) return;
            document.querySelectorAll('.card-item').forEach(i => i.classList.remove('drop-above','drop-below'));
            const { top, height } = item.getBoundingClientRect();
            item.classList.add(e.clientY < top + height / 2 ? 'drop-above' : 'drop-below');
          });
          item.addEventListener('dragleave', () => item.classList.remove('drop-above','drop-below'));
          item.addEventListener('drop', e => {
            e.preventDefault();
            if (!src || src === item) return;
            const { top, height } = item.getBoundingClientRect();
            item.parentNode.insertBefore(src, e.clientY < top + height / 2 ? item : item.nextSibling);
          });
        });
      }

      // ── EDGEカードに稼働モード(LIVE/DRY/HALT)バッジのみライブ表示(認証cookieが無い/障害時は静的表示のまま) ──
      // 戦略の中身はダッシュボード側「現在の戦略」セクションに表示(2026-07-04、カードからは撤去)
      async function hydrateEdgeCard() {
        const body = document.querySelector('.card-item[data-id="hyperliquid-bot"] .card-body');
        if (!body) return;
        try {
          const res = await fetch('/hyperliquid-bot/api/strategy', { cache: 'no-store' });
          if (!res.ok) return;
          const d = await res.json();

          const mode = d.halted ? ['halt', 'HALT'] : d.dry_run ? ['', 'DRY'] : ['live', 'LIVE'];
          const title = body.querySelector('.card-title');
          if (title && !title.querySelector('.live-badge')) {
            title.insertAdjacentHTML('beforeend',
              ` <span class="live-badge ${mode[0]}"><span class="live-dot"></span>${mode[1]}</span>`);
          }
        } catch {}
      }

      const isTouchDevice = () => window.matchMedia('(pointer: coarse)').matches;
      renderList(loadOrder());
      hydrateEdgeCard();

      document.getElementById('title').addEventListener('click', () => {
        location.href = location.pathname + '?_=' + Date.now();
      });
    </script>
  </body>
</html>
