<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0b" />
    <title>アプリポータル</title>
    <style>
      :root {
        color-scheme: dark;
        --bg:      #0a0a0b;
        --surface: #141415;
        --border:  #2a2a2c;
        --text:    #f5f5f7;
        --muted:   #86868b;
        --accent:  #c0392b;

        --text-sm:   clamp(0.78rem,  0.74rem + 0.2vw,  0.85rem);
        --text-base: clamp(0.93rem,  0.88rem + 0.25vw, 1rem);
        --text-2xl:  clamp(1.6rem,   1.4rem  + 1vw,    2.1rem);
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
          "Hiragino Kaku Gothic ProN", "Yu Gothic UI", Meiryo, sans-serif;
        padding: 40px 20px;
        -webkit-font-smoothing: antialiased;
      }

      .wrap { width: 100%; max-width: 480px; }

      header { margin-bottom: 28px; }

      h1 {
        font-size: var(--text-2xl);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.1;
        margin-bottom: 6px;
      }

      p.sub {
        font-size: var(--text-sm);
        color: var(--muted);
      }

      /* ---- Card list ---- */
      .card-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .card-item {
        animation: rise .4s cubic-bezier(.16,1,.3,1) both;
      }
      .card-item:nth-child(1) { animation-delay:  40ms; }
      .card-item:nth-child(2) { animation-delay:  90ms; }
      .card-item:nth-child(3) { animation-delay: 140ms; }
      .card-item:nth-child(4) { animation-delay: 190ms; }

      @keyframes rise {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .card-item { animation: none; }
      }

      a.card {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 13px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        text-decoration: none;
        color: inherit;
        transition: border-color .18s, box-shadow .18s, transform .12s;
        -webkit-tap-highlight-color: transparent;
      }

      a.card:hover {
        border-color: var(--c, var(--accent));
        box-shadow:
          0 0 0 1px color-mix(in srgb, var(--c, var(--accent)) 40%, transparent),
          0 6px 28px color-mix(in srgb, var(--c, var(--accent)) 10%, transparent);
        transform: translateY(-1px);
      }
      a.card:active { transform: scale(0.985); box-shadow: none; }

      .card-icon {
        width: 46px;
        height: 46px;
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.45rem;
        flex-shrink: 0;
      }

      .card-body { flex: 1; min-width: 0; }

      .card-title {
        font-size: var(--text-base);
        font-weight: 600;
        letter-spacing: -0.015em;
      }

      .card-desc {
        font-size: var(--text-sm);
        color: var(--muted);
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-chevron {
        color: #3a3a3c;
        flex-shrink: 0;
        transition: color .18s;
      }
      a.card:hover .card-chevron { color: var(--muted); }

      footer {
        margin-top: 24px;
        text-align: center;
        font-size: 0.68rem;
        color: #333335;
        letter-spacing: 0.02em;
      }

      /* ---- Drag states ---- */
      .card-item.is-dragging > a.card {
        opacity: 0.2;
        border-style: dashed;
      }
      .card-item.drop-above { border-top: 2px solid var(--accent); border-radius: 2px; }
      .card-item.drop-below { border-bottom: 2px solid var(--accent); border-radius: 2px; }

      #drag-clone {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        width: var(--w);
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 13px 14px;
        background: var(--surface);
        border: 1px solid var(--accent);
        border-radius: 16px;
        opacity: 0.96;
        transform: scale(1.04) rotate(0.8deg);
        box-shadow: 0 16px 48px rgba(0,0,0,0.7);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header>
        <h1>アプリポータル</h1>
        <p class="sub">利用するアプリを選んでください</p>
      </header>
      <ul class="card-list" id="cardList"></ul>
      <footer>個人利用・学習目的のツール群</footer>
    </main>

    <script>
      const APPS = [
        { id: 'agents',   href: '/agents/',   emoji: '🤖', color: '#a855f7', title: 'BASE',  desc: 'エージェント管理・監視ログ' },
        { id: 'tasks',    href: '/tasks/',    emoji: '✅', color: '#22c55e', title: 'STACK', desc: 'Claudeへの依頼メモ' },
        { id: 'briefing', href: '/briefing',  emoji: '📰', color: '#f59e0b', title: 'PULSE', desc: '毎朝の自動ニュースまとめ' },
        { id: 'onepiece', href: '/onepiece',  emoji: '🏴‍☠️', color: '#ef4444', title: '道場',  desc: 'ONE PIECEクイズに挑戦' },
        { id: 'marumie',  href: '/marumie',   emoji: '🔍', color: '#3b82f6', title: 'LENS',  desc: '国家予算の可視化' },
        { id: 'diary',    href: '/diary/',    emoji: '📓', color: '#d4a030', title: 'LOG',   desc: 'Claude機能開発の記録' },
      ];

      const STORAGE_KEY = 'portal-order-v2';

      function cardHTML(app) {
        const iconBg = `color-mix(in srgb,${app.color} 16%,#1c1c1e)`;
        return `<a class="card" href="${app.href}" style="--c:${app.color}">
          <div class="card-icon" style="background:${iconBg}">${app.emoji}</div>
          <div class="card-body">
            <div class="card-title">${app.title}</div>
            <div class="card-desc">${app.desc}</div>
          </div>
          <svg class="card-chevron" width="7" height="12" viewBox="0 0 7 12" fill="none">
            <path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>`;
      }

      function loadOrder() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (Array.isArray(saved)) {
            const ordered = saved.map(id => APPS.find(a => a.id === id)).filter(Boolean);
            const rest = APPS.filter(a => !saved.includes(a.id));
            return [...ordered, ...rest];
          }
        } catch {}
        return [...APPS];
      }

      function saveOrder() {
        const ids = [...document.querySelectorAll('.card-item')].map(el => el.dataset.id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
      }

      function renderList(items) {
        const list = document.getElementById('cardList');
        list.innerHTML = '';
        items.forEach(app => {
          const li = document.createElement('li');
          li.className = 'card-item';
          li.dataset.id = app.id;
          li.innerHTML = cardHTML(app);
          list.appendChild(li);
        });
        attachTouch();
        if (!isTouchDevice()) attachMouse();
      }

      // ---- タッチドラッグ（iPhone対応）----
      const LONG_PRESS = 400;
      let pressTimer = null, dragItem = null, clone = null, offX = 0, offY = 0;

      function getItemAt(x, y) {
        if (clone) clone.style.display = 'none';
        const el = document.elementFromPoint(x, y);
        if (clone) clone.style.display = '';
        return el && el.closest('.card-item');
      }

      function startDrag(item, touch) {
        dragItem = item;
        item.classList.add('is-dragging');
        const rect = item.getBoundingClientRect();
        offX = touch.clientX - rect.left;
        offY = touch.clientY - rect.top;

        clone = document.createElement('div');
        clone.id = 'drag-clone';
        clone.style.setProperty('--w', rect.width + 'px');
        clone.innerHTML = item.querySelector('a.card').innerHTML;
        clone.style.left = (touch.clientX - offX) + 'px';
        clone.style.top  = (touch.clientY - offY) + 'px';
        document.body.appendChild(clone);

        if (navigator.vibrate) navigator.vibrate(30);
      }

      function moveDrag(touch) {
        if (!clone) return;
        clone.style.left = (touch.clientX - offX) + 'px';
        clone.style.top  = (touch.clientY - offY) + 'px';
        document.querySelectorAll('.card-item').forEach(i => i.classList.remove('drop-above','drop-below'));
        const target = getItemAt(touch.clientX, touch.clientY);
        if (target && target !== dragItem) {
          const { top, height } = target.getBoundingClientRect();
          target.classList.add(touch.clientY < top + height / 2 ? 'drop-above' : 'drop-below');
        }
      }

      function endDrag(touch) {
        if (!dragItem) return;
        const target = getItemAt(touch.clientX, touch.clientY);
        if (target && target !== dragItem) {
          const { top, height } = target.getBoundingClientRect();
          const list = target.parentNode;
          list.insertBefore(dragItem, touch.clientY < top + height / 2 ? target : target.nextSibling);
          saveOrder();
        }
        dragItem.classList.remove('is-dragging');
        document.querySelectorAll('.card-item').forEach(i => i.classList.remove('drop-above','drop-below'));
        if (clone) { clone.remove(); clone = null; }
        dragItem = null;
      }

      function attachTouch() {
        document.querySelectorAll('.card-item').forEach(item => {
          item.addEventListener('touchstart', e => {
            const touch = e.touches[0];
            pressTimer = setTimeout(() => { pressTimer = null; startDrag(item, touch); }, LONG_PRESS);
          }, { passive: true });

          item.addEventListener('touchmove', e => {
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            if (!dragItem) return;
            e.preventDefault();
            moveDrag(e.touches[0]);
          }, { passive: false });

          item.addEventListener('touchend', e => {
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            if (!dragItem) return;
            e.preventDefault();
            endDrag(e.changedTouches[0]);
          }, { passive: false });

          item.addEventListener('touchcancel', () => {
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            if (dragItem) dragItem.classList.remove('is-dragging');
            document.querySelectorAll('.card-item').forEach(i => i.classList.remove('drop-above','drop-below'));
            if (clone) { clone.remove(); clone = null; }
            dragItem = null;
          });
        });
      }

      // ---- デスクトップ D&D ----
      function attachMouse() {
        let src = null;
        document.querySelectorAll('.card-item').forEach(item => {
          item.draggable = true;
          item.addEventListener('dragstart', () => { src = item; item.classList.add('is-dragging'); });
          item.addEventListener('dragend',   () => {
            item.classList.remove('is-dragging');
            document.querySelectorAll('.card-item').forEach(i => i.classList.remove('drop-above','drop-below'));
            saveOrder();
          });
          item.addEventListener('dragover', e => {
            e.preventDefault();
            if (!src || src === item) return;
            document.querySelectorAll('.card-item').forEach(i => i.classList.remove('drop-above','drop-below'));
            const { top, height } = item.getBoundingClientRect();
            item.classList.add(e.clientY < top + height / 2 ? 'drop-above' : 'drop-below');
          });
          item.addEventListener('dragleave', () => item.classList.remove('drop-above','drop-below'));
          item.addEventListener('drop', e => {
            e.preventDefault();
            if (!src || src === item) return;
            const { top, height } = item.getBoundingClientRect();
            item.parentNode.insertBefore(src, e.clientY < top + height / 2 ? item : item.nextSibling);
          });
        });
      }

      const isTouchDevice = () => window.matchMedia('(pointer: coarse)').matches;
      renderList(loadOrder());
    </script>
  </body>
</html>
